name: Build & Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Tests (always) ─────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  # ── 2. Build installer (only on version tags) ─────────────────────────────
  build:
    name: Build installer
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build
        run: python build.py

      - name: Verify artifacts
        shell: pwsh
        run: |
          $exe       = "dist\ExcelDiff\ExcelDiff.exe"
          $installer = Get-ChildItem "installer\Output\*.exe" | Select-Object -First 1
          if (-not (Test-Path $exe)) { throw "ExcelDiff.exe not found" }
          if (-not $installer)       { throw "Installer not found" }
          Write-Output "exe:       $exe"
          Write-Output "installer: $($installer.FullName)"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExcelDiff-installer-${{ github.ref_name }}
          path: installer/Output/*.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
